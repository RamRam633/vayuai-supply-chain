# Render blueprint for Global Supply Chain Pulse.
# Push to GitHub, then in Render: "New" -> "Blueprint" -> point to this repo.
#
# Free tier on Render:
#   - no persistent disks
#   - no cron jobs (they can't share state with the web service)
# So we run a single web service. The app refreshes data on-demand via the
# "Refresh data now" button (or automatically on first request if no snapshot
# exists). Upgrade to a paid plan later to bring back the 15-min cron + disk.

services:
  - type: web
    name: supply-chain-pulse
    env: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: free                # upgrade to starter ($7/mo) to avoid sleep + enable disk
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: AISSTREAM_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NOAA_USER_AGENT
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENABLE_CLAUDE_SUMMARY
        value: "false"
      - key: CACHE_DB_PATH
        value: /tmp/cache.sqlite
      - key: REFRESH_INTERVAL_MINUTES
        value: "15"
