[server]
headless = true
port = 8501
enableXsrfProtection = true

# Tell Streamlit to paint the vayuai dark theme from the very first frame.
# Without this, every page switch flashes the default light theme before
# our injected CSS overrides it.
[theme]
base = "dark"
primaryColor = "#d4af37"
backgroundColor = "#0b0a09"
secondaryBackgroundColor = "#131110"
textColor = "#f5f1e8"
font = "sans serif"

[browser]
gatherUsageStats = false
